<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truemate Group | Cotización Trucking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy:#0E2438;
    --navy-2:#16324D;
    --steel:#3E6E8E;
    --amber:#C8963E;
    --amber-2:#E0AF5C;
    --paper:#F5F3EE;
    --paper-2:#EDEAE1;
    --ink:#1B2430;
    --ink-soft:#5B6472;
    --line:#DAD5C8;
    --ok:#3E7A52;
    --white:#FFFFFF;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.serif{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  .hidden{display:none !important;}

  .topbar{
    background:var(--navy);color:var(--white);padding:20px 32px;
    display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--amber);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:34px;height:34px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:var(--navy);font-size:16px;}
  .brand-text{line-height:1.15;}
  .brand-text .t1{font-family:'Fraunces',serif;font-weight:600;font-size:17px;}
  .brand-text .t2{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#B9C4CE;}

  .wrap{max-width:1280px;margin:0 auto;padding:32px;display:grid;grid-template-columns:0.95fr 1.05fr;gap:28px;align-items:start;}
  @media(max-width:980px){.wrap{grid-template-columns:1fr;}}

  .panel{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);}
  .panel-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;justify-content:space-between;}
  .panel-head h2{margin:0;font-size:18px;font-weight:600;}
  .panel-head .num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber);letter-spacing:1px;}
  .panel-body{padding:20px;max-height:calc(100vh - 130px);overflow-y:auto;}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .field-row.single{grid-template-columns:1fr;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field select{font-family:'Inter',sans-serif;padding:8px 10px;border:1px solid var(--line);border-radius:var(--radius);font-size:13.5px;background:var(--paper);color:var(--ink);}
  .field input:focus,.field select:focus{outline:none;border-color:var(--steel);background:var(--white);}

  .section-title{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy-2);margin:18px 0 8px;padding-top:14px;border-top:1px dashed var(--line);}
  .section-title:first-child{margin-top:0;padding-top:0;border-top:none;}
  .hint{font-size:11.5px;color:var(--ink-soft);margin:-2px 0 10px;}

  .cov-row{display:grid;grid-template-columns:20px 1.3fr 1fr;gap:8px;align-items:center;margin-bottom:7px;}
  .cov-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--amber);}
  .cov-row input[type=text]{padding:6px 8px;font-size:12.5px;}

  .pay-table{width:100%;border-collapse:collapse;margin-top:4px;}
  .pay-table th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);text-align:left;padding:0 4px 5px;}
  .pay-table td{padding:3px 4px;}
  .pay-table input{width:100%;padding:6px 7px;font-size:12.5px;border:1px solid var(--line);border-radius:var(--radius);}
  .row-actions{display:flex;gap:8px;margin-top:8px;}
  .calc-box{background:var(--paper);border:1px dashed var(--line);border-radius:var(--radius);padding:12px 14px;margin-top:10px;}
  .calc-box .calc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);margin-bottom:8px;}
  .comp-row{display:grid;grid-template-columns:1.3fr 1fr 26px;gap:8px;align-items:center;margin-bottom:6px;}
  .comp-row input{padding:6px 8px;font-size:12.5px;border:1px solid var(--line);border-radius:var(--radius);}
  .calc-total{margin-top:8px;display:flex;justify-content:space-between;align-items:center;background:var(--paper-2);padding:8px 10px;border-radius:var(--radius);font-size:12.5px;font-weight:700;color:var(--navy-2);}
  .calc-total .amt{font-family:'JetBrains Mono',monospace;}
  .calc-apply{margin-top:8px;width:100%;}

  .btn{font-family:'Inter',sans-serif;font-weight:600;font-size:13px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--navy);background:var(--white);color:var(--navy);cursor:pointer;transition:background .15s,color .15s;}
  .btn:hover{background:var(--navy);color:var(--white);}
  .btn-ghost{border-color:var(--line);color:var(--ink-soft);}
  .btn-ghost:hover{background:var(--paper-2);color:var(--ink);}
  .btn-sm{padding:6px 10px;font-size:12px;}

  /* export toolbar */
  .export-bar{display:flex;gap:8px;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--paper-2);}
  .btn-export{background:var(--navy);color:var(--white);border-color:var(--navy);}
  .btn-export:hover{background:var(--navy-2);}
  .btn-export.amber{background:var(--amber);border-color:var(--amber);color:var(--navy);}
  .btn-export.amber:hover{background:var(--amber-2);}
  .btn-export.wa{background:#25D366;border-color:#25D366;color:#fff;}
  .btn-export.wa:hover{background:#1EBE5A;}

  .preview-scroll{max-height:calc(100vh - 190px);overflow-y:auto;background:var(--paper);}

  /* ===== DOC (live preview / export target) ===== */
  #doc{max-width:680px;margin:0 auto;padding:26px 26px 30px;background:var(--paper);}
  .doc-header{text-align:center;margin-bottom:14px;}
  .doc-header .tagline{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:4px;}
  .doc-header .agency{font-family:'Fraunces',serif;font-weight:700;font-size:24px;color:var(--navy);}
  .doc-header .sub{font-size:11px;color:var(--ink-soft);margin-top:4px;line-height:1.5;}
  .doc-header img.logo{max-width:220px;height:auto;margin-bottom:6px;}
  .doc-rule{height:3px;background:linear-gradient(90deg,var(--navy),var(--amber));margin:12px 0 16px;border-radius:2px;}

  .status-chip{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 11px;border-radius:20px;background:#E4F0E6;color:var(--ok);margin-bottom:10px;}
  .doc-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0 0 2px;}
  .doc-subtitle{font-size:12px;color:var(--ink-soft);margin:0 0 12px;font-style:italic;}

  .company-band{background:var(--navy);color:var(--white);padding:11px 16px;border-radius:var(--radius) var(--radius) 0 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px;}
  .company-band .name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;}
  .company-band .meta{font-size:10.5px;color:#B9C4CE;font-family:'JetBrains Mono',monospace;}

  .cov-card{border:1px solid var(--line);border-top:none;background:var(--white);}
  .cov-line{display:flex;justify-content:space-between;padding:7px 16px;border-bottom:1px solid var(--paper-2);font-size:12.5px;}
  .cov-line:last-child{border-bottom:none;}
  .cov-line .k{color:var(--ink-soft);font-weight:500;}
  .cov-line .v{font-weight:600;}
  .cov-line.dp{background:#F5EEDD;}
  .cov-line.dp .k,.cov-line.dp .v{color:var(--navy-2);font-weight:700;}

  .benefits-card{border:1px solid var(--line);background:var(--white);padding:10px 16px;}
  .benefit-item{display:flex;align-items:baseline;gap:8px;font-size:12px;padding:4px 0;color:var(--ink);break-inside:avoid;}
  .benefit-item .dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0;position:relative;top:-1px;}
  .benefits-grid{display:grid;grid-template-columns:1fr 1fr;column-gap:16px;}

  .doc-h2{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--navy-2);margin:16px 0 6px;}

  table.sched{width:100%;border-collapse:collapse;border:1px solid var(--line);background:var(--white);}
  table.sched th{background:var(--paper-2);font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);text-align:left;padding:6px 12px;border-bottom:1px solid var(--line);}
  table.sched td{padding:6px 12px;font-size:12px;border-bottom:1px solid var(--paper-2);}
  table.sched tr:last-child td{border-bottom:none;}
  table.sched td.num{color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:11px;}
  table.sched td.amt{text-align:right;font-weight:700;font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;}

  .summary-grid{border:1px solid var(--line);background:var(--white);}
  .summary-row{display:flex;justify-content:space-between;padding:7px 16px;border-bottom:1px solid var(--paper-2);font-size:12.5px;}
  .summary-row:last-child{border-bottom:none;}
  .summary-row.total{background:#F5EEDD;font-weight:700;}
  .summary-row .k{color:var(--ink-soft);}
  .summary-row.total .k{color:var(--navy-2);}

  .pay-methods{border:1px solid var(--line);background:var(--white);padding:12px 16px;font-size:12px;line-height:1.6;}
  .pay-methods b{color:var(--navy-2);}

  .doc-footer{margin-top:16px;padding-top:12px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-soft);text-align:center;line-height:1.6;}
  .doc-footer .advisor{font-weight:700;color:var(--ink);}

  .cta-wrap{margin-top:22px;text-align:center;}
  .cta{display:inline-block;background:var(--amber);color:var(--navy);font-weight:700;padding:12px 26px;border-radius:var(--radius);text-decoration:none;font-size:13px;}

  .link-box{margin:14px 20px 0;background:var(--navy);color:var(--white);border-radius:var(--radius);padding:14px 16px;}
  .link-box .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--amber-2);margin-bottom:6px;}
  .link-box .url{font-family:'JetBrains Mono',monospace;font-size:11.5px;word-break:break-all;background:rgba(255,255,255,.08);padding:9px 10px;border-radius:var(--radius);margin-bottom:9px;}
  .link-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn-light{background:var(--white);border-color:var(--white);color:var(--navy);font-size:12px;padding:7px 12px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">TM</div>
    <div class="brand-text"><div class="t1">Truemate Group</div><div class="t2">Cotización Trucking — vista en vivo</div></div>
  </div>
</div>

<div class="wrap">

  <div class="panel">
    <div class="panel-head"><h2>Datos</h2><span class="num">01 / FORM</span></div>
    <div class="panel-body" id="form-body"></div>
  </div>

  <div class="panel">
    <div class="export-bar">
      <button class="btn btn-export amber" id="pdf-btn">Descargar PDF</button>
      <button class="btn btn-export" id="img-btn">Descargar imagen (PNG)</button>
      <button class="btn btn-export" id="copy-img-btn">Copiar imagen</button>
      <button class="btn btn-export wa" id="wa-btn">Enviar por WhatsApp</button>
      <span style="width:1px;background:var(--line);margin:0 2px;"></span>
      <button class="btn btn-ghost btn-sm" id="lang-es-btn" style="min-width:44px;">ES</button>
      <button class="btn btn-sm" id="lang-en-btn" style="min-width:44px;">EN</button>
    </div>
    <div class="preview-scroll"><div id="doc"></div></div>
  </div>

</div>

document.getElementById('form-body').addEventListener('focusout', (e) => {
  const t = e.target;
  const MONEY_FIELD_IDS = ['f-dp', 'f-dpunit', 'f-init', 'f-balance'];
  let shouldFormat = false;

  if (t.classList && t.classList.contains('cov-value')) {
    const row = t.closest('.cov-row');
    const label = (row ? row.querySelector('.cov-label').value : '').toLowerCase();
    // no formatear campos que son conteos, no dinero (Miles, Power Units, etc.)
    if (!label.includes('miles') && !label.includes('unit')) shouldFormat = true;
  } else if (MONEY_FIELD_IDS.includes(t.id)) {
    shouldFormat = true;
  } else if (t.classList && (t.classList.contains('pay-amount') || t.classList.contains('comp-value'))) {
    shouldFormat = true;
  }

  if (shouldFormat && looksLikePlainAmount(t.value)) {
    t.value = formatAsMoney(t.value);
    renderPreview();
    updateCalcTotals();
  }
});

function looksLikePlainAmount(s){
  return /^[\d.,\s$]+$/.test(s || '') && /\d/.test(s || '');
}

function parseMoneyInput(raw){
  let s = String(raw || '').trim().replace(/[$\s]/g, '');
  if (!s) return null;

  const hasComma = s.includes(',');
  const hasDot = s.includes('.');

  if (hasComma && hasDot) {
    // formato US: coma = miles, punto = decimal → "1,359.87"
    return parseFloat(s.replace(/,/g, ''));
  }
  if (hasComma && !hasDot) {
    const parts = s.split(',');
    if (parts.length === 2 && parts[1].length <= 2) {
      // coma usada como decimal → "1359,87"
      return parseFloat(parts[0] + '.' + parts[1]);
    }
    // coma(s) como separador de miles → "135,987" o "1,359,800"
    return parseFloat(parts.join(''));
  }
  if (hasDot && !hasComma) {
    const parts = s.split('.');
    if (parts.length === 2 && parts[1].length <= 2) {
      // punto decimal normal → "1359.87"
      return parseFloat(s);
    }
    // punto usado como separador de miles → "750.000"
    return parseFloat(parts.join(''));
  }
  return parseFloat(s);
}

function formatAsMoney(s){
  const num = parseMoneyInput(s);
  if (num === null || isNaN(num)) return s;
  const hasCents = Math.round(num * 100) % 100 !== 0;
  return '$' + num.toLocaleString('en-US', hasCents
    ? { minimumFractionDigits: 2, maximumFractionDigits: 2 }
    : { maximumFractionDigits: 0 });
}

function parseDateMMDDYYYY(s){
  const m = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec((s || '').trim());
  if (!m) return null;
  return new Date(parseInt(m[3], 10), parseInt(m[1], 10) - 1, parseInt(m[2], 10));
}
function formatDateMMDDYYYY(d){
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${mm}/${dd}/${d.getFullYear()}`;
}
function autofillMonthlyDates(){
  const rows = [...document.querySelectorAll('#pay-body tr')];
  if (!rows.length) return;
  const firstInput = rows[0].querySelector('.pay-date');
  const base = parseDateMMDDYYYY(firstInput.value);
  if (!base) {
    alert('Escribe primero la fecha del pago #1 en formato MM/DD/YYYY (ej. 07/20/2026).');
    return;
  }
  rows.forEach((row, i) => {
    if (i === 0) return;
    const d = new Date(base.getFullYear(), base.getMonth() + i, base.getDate());
    row.querySelector('.pay-date').value = formatDateMMDDYYYY(d);
  });
  renderPreview();
}

function safeName(d){ return (d.company||'cliente').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,''); }

function captureCanvas(){
  const el = document.getElementById('doc');
  return html2canvas(el, { scale:2, backgroundColor:'#F5F3EE', useCORS:true });
}

function buildPdfBlob(canvas){
  const { jsPDF } = window.jspdf;
  const imgWidth = 612; // US Letter width in pt (8.5in)
  const imgHeight = canvas.height * imgWidth / canvas.width;
  const pdf = new jsPDF({ unit:'pt', format:[imgWidth, imgHeight], orientation:'portrait' });
  const imgData = canvas.toDataURL('image/jpeg', 0.95);
  pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
  return pdf;
}

function setBtnBusy(btn, busyText){
  const original = btn.textContent;
  btn.textContent = busyText;
  btn.disabled = true;
  return () => { btn.textContent = original; btn.disabled = false; };
}

document.getElementById('pdf-btn').addEventListener('click', async () => {

});

document.getElementById('copy-img-btn').addEventListener('click', async () => {
  const btn = document.getElementById('copy-img-btn');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Copiando...';
  let success = false;
  try {
    if (!window.ClipboardItem) {
      alert('Tu navegador no permite copiar la imagen directamente. Usa "Descargar imagen" y luego insértala manualmente en el correo.');
      return;
    }
    const canvas = await captureCanvas();
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    success = true;
    btn.textContent = '✓ Copiada — pega con Ctrl+V';
    setTimeout(() => { btn.textContent = original; }, 2500);
  } catch (e) {
    alert('No se pudo copiar la imagen: ' + e.message + '\n\nUsa "Descargar imagen" como alternativa.');
  } finally {
    btn.disabled = false;
    if (!success) btn.textContent = original;
  }
});

/* ===== guardar / cargar cotizaciones (Google Sheet vía Apps Script, con respaldo local) ===== */
const STORE_KEY = 'truemate_trucking_quotes_v1';
const GS_URL_KEY = 'truemate_gsheet_url';
const RAW_FIELD_IDS = ['f-company','f-option','f-usdot','f-mc','f-effdate','f-status','f-client-phone','f-benefits','f-dp','f-dpunit','f-init','f-balance'];

const DEFAULT_GS_URL = 'https://script.google.com/macros/s/AKfycbze5E6FqQVfSW5mp8q0hMCzcnqW7usnfhjdE0_wKWYhqdlH9Csc6HEqjGUcaGMQ-5Su/exec';
function getGSUrl(){
  try {
    const stored = (localStorage.getItem(GS_URL_KEY) || '').trim();
    if (stored) return stored;
  } catch (e) { /* localStorage bloqueado (ej. dentro de un iframe/CRM) */ }
  return DEFAULT_GS_URL;
}
function setGSUrl(url){ try { localStorage.setItem(GS_URL_KEY, url.trim()); } catch (e) { /* ignorar si está bloqueado */ } }

function getStore(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
  catch (e) { return {}; }
}
function setStore(obj){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch (e) { /* ignorar si está bloqueado */ }
}

async function gsGet(params){
  const url = getGSUrl();
  if (!url) return null;
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(url + '?' + qs);
  return res.json();
}
async function gsPost(body){
  const url = getGSUrl();
  if (!url) return null;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS en Apps Script
    body: JSON.stringify(body),
  });
  return res.json();
}

function collectRawState(){
  const covs = [...document.querySelectorAll('#cov-list .cov-row')].map(r => ({
    on: r.querySelector('.cov-on').checked,
    label: r.querySelector('.cov-label').value,
    value: r.querySelector('.cov-value').value,
  }));
  const payments = [...document.querySelectorAll('#pay-body tr')].map(r => ({
    date: r.querySelector('.pay-date').value,
    amount: r.querySelector('.pay-amount').value,
  }));
  const fields = {};
  RAW_FIELD_IDS.forEach(id => { const el = document.getElementById(id); if (el) fields[id] = el.value; });
  return { fields, covs, payments, lang: currentLang, savedAt: new Date().toISOString() };
}

function applyRawState(state){
  Object.entries(state.fields || {}).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.value = val;
  });
  document.getElementById('cov-list').innerHTML = '';
  (state.covs || []).forEach(c => addCovRow(c));
  document.getElementById('pay-body').innerHTML = '';
  (state.payments || []).forEach(p => addPayRow(p.date, p.amount));
  if (state.lang) setLang(state.lang);
  renderPreview();
}

function updateSyncStatus(){
  const el = document.getElementById('sync-status');
  if (getGSUrl()) {
    el.textContent = '✓ Conectado a Google Sheet — visible desde cualquier computador.';
    el.style.color = 'var(--ok)';
  } else {
    el.textContent = 'Sin conectar — se guardan solo en este navegador. Pega la URL de Apps Script para sincronizar entre computadores.';
    el.style.color = 'var(--ink-soft)';
  }
}

let savedQuotesCache = [];

function renderSavedOptions(list){
  const sel = document.getElementById('saved-select');
  const previousValue = sel.value;
  sel.innerHTML = list.length
    ? list.map(q => `<option value="${escapeHtml(q.company)}">${escapeHtml(q.company)} — ${new Date(q.savedAt).toLocaleDateString('es-ES')}${q.local ? ' (local)' : ''}</option>`).join('')
    : '<option value="">(sin resultados)</option>';
  if (list.some(q => q.company === previousValue)) sel.value = previousValue;
}

async function refreshSavedList(){
  const sel = document.getElementById('saved-select');
  const url = getGSUrl();

  if (url) {
    sel.innerHTML = '<option value="">Cargando...</option>';
    try {
      const resp = await gsGet({ action: 'list' });
      if (resp && resp.ok) {
        savedQuotesCache = resp.quotes
          .map(q => ({ company: q.company, savedAt: q.savedAt, local: false }))
          .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
        applySavedSearchFilter();
        return;
      }
    } catch (e) { /* si falla la red, cae al respaldo local */ }
  }

  const store = getStore();
  savedQuotesCache = Object.keys(store)
    .map(k => ({ company: k, savedAt: store[k].savedAt, local: true }))
    .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
  applySavedSearchFilter();
}

function applySavedSearchFilter(){
  const q = (document.getElementById('saved-search').value || '').trim().toLowerCase();
  const filtered = q ? savedQuotesCache.filter(item => item.company.toLowerCase().includes(q)) : savedQuotesCache;
  renderSavedOptions(filtered);
}

      const url = getGSUrl();
      if (url) {
        const resp = await gsPost({ action: 'save', company, state });
        if (!resp || !resp.ok) throw new Error('respuesta inválida del Sheet');
      } else {
        const store = getStore();
        if (store[company] && !confirm(`Ya existe una cotización guardada como "${company}". ¿Reemplazarla?`)) { btn.disabled = false; btn.textContent = original; return; }
        store[company] = state;
        setStore(store);
      }
      await refreshSavedList();
      document.getElementById('saved-select').value = company;
      btn.textContent = '✓ Guardada';
    } catch (e) {
      alert('No se pudo guardar en el Sheet (' + e.message + '). Revisa la URL o tu conexión — por ahora se guardó solo en este navegador.');
      const store = getStore();
      store[company] = state;
      setStore(store);
      await refreshSavedList();
      btn.textContent = original;
    } finally {
      setTimeout(() => { btn.disabled = false; btn.textContent = original; }, 1500);
    }
  });

  document.getElementById('load-btn').addEventListener('click', async () => {
    const key = document.getElementById('saved-select').value;
    if (!key) { alert('Selecciona una cotización guardada primero.'); return; }
    const btn = document.getElementById('load-btn');
    const original = btn.textContent;
    btn.disabled = true; btn.textContent = 'Cargando...';
    try {
      const url = getGSUrl();
      if (url) {
        const resp = await gsGet({ action: 'get', company: key });
        if (resp && resp.ok) { applyRawState(resp.state); return; }
        throw new Error('no encontrada en el Sheet');
      } else {
        const store = getStore();
        if (store[key]) { applyRawState(store[key]); return; }
        throw new Error('no encontrada');
      }
    } catch (e) {
      alert('No se pudo cargar: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = original;
    }
  });

  document.getElementById('delete-btn').addEventListener('click', async () => {
    const key = document.getElementById('saved-select').value;
    if (!key) return;
    if (!confirm(`¿Eliminar la cotización guardada de "${key}"? Esto no se puede deshacer.`)) return;
    try {
      const url = getGSUrl();
      if (url) {
        await gsPost({ action: 'delete', company: key });
      } else {
        const store = getStore();
        delete store[key];
        setStore(store);
      }
      await refreshSavedList();
    } catch (e) {
      alert('No se pudo eliminar: ' + e.message);
    }
  });

  document.getElementById('export-btn').addEventListener('click', () => {
    const d = collectData();
    const state = collectRawState();
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const link = document.createElement('a');
    link.download = `Borrador-${safeName(d)}.json`;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
  });

  document.getElementById('import-btn').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });

  document.getElementById('import-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const state = JSON.parse(reader.result);
        applyRawState(state);
      } catch (err) {
        alert('El archivo no es un borrador válido.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
}

function setLang(lang){
  currentLang = lang;
  const esBtn = document.getElementById('lang-es-btn');
  const enBtn = document.getElementById('lang-en-btn');
  if (lang === 'en') {
    esBtn.classList.add('btn-ghost'); esBtn.classList.remove('btn-export','amber');
    enBtn.classList.remove('btn-ghost');
  } else {
    enBtn.classList.add('btn-ghost');
    esBtn.classList.remove('btn-ghost');
  }
  renderPreview();
}
document.getElementById('lang-es-btn').addEventListener('click', () => setLang('es'));
document.getElementById('lang-en-btn').addEventListener('click', () => setLang('en'));

buildForm();
renderPreview();

</script>
</body>
</html>
